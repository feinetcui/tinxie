name = "tinxie"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 静态资源
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Objects
[durable_objects]
bindings = [
  { name = "ROOM", class_name = "Room" }
]

# Durable Objects 迁移 - 使用 SQLite 模式（免费计划必需）
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
