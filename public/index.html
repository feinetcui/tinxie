<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亲子听写对战</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .home-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .title {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 40px;
      text-align: center;
    }

    .role-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .role-card {
      background: white;
      border-radius: 16px;
      padding: 40px 30px;
      width: 200px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      text-decoration: none;
      color: inherit;
    }

    .role-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .role-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .role-title {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 10px;
    }

    .role-desc {
      font-size: 0.9rem;
      color: #666;
    }

    .footer {
      margin-top: 60px;
      color: #999;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="home-container">
    <h1 class="title">亲子听写对战</h1>
    
    <div class="role-cards">
      <a href="host.html" class="role-card">
        <div class="role-icon">👨‍👩‍👧</div>
        <div class="role-title">控制端</div>
        <div class="role-desc">家长/老师创建房间<br>拍照识别词库</div>
      </a>
      
      <a href="player.html" class="role-card">
        <div class="role-icon">✍️</div>
        <div class="role-title">选手端</div>
        <div class="role-desc">学生扫码加入<br>手写汉字作答</div>
      </a>
    </div>

    <div class="footer">
      <p>支持移动端和PC端 | 使用 Agnes AI 智能识别</p>
    </div>
  </div>
</body>
</html>
