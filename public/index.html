<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>亲子听写对战</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .home-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }

    .title {
      font-size: 2.5rem;
      color: white;
      margin-bottom: 16px;
      text-align: center;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 40px;
      text-align: center;
    }

    .role-cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .role-card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      width: 220px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      color: inherit;
      touch-action: manipulation;
    }

    .role-card:hover, .role-card:active {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .role-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .role-title {
      font-size: 1.6rem;
      color: #333;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .role-desc {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
    }

    .footer {
      margin-top: 50px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95rem;
      text-align: center;
    }

    .decoration {
      position: fixed;
      font-size: 2.5rem;
      opacity: 0.3;
      animation: float 6s infinite ease-in-out;
    }

    .decoration:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
    .decoration:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
    .decoration:nth-child(3) { bottom: 20%; left: 20%; animation-delay: 2s; }
    .decoration:nth-child(4) { bottom: 30%; right: 10%; animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    @media (max-width: 500px) {
      .title {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 1.1rem;
        margin-bottom: 30px;
      }

      .role-cards {
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .role-card {
        width: 100%;
        max-width: 280px;
        padding: 30px 24px;
        border-radius: 20px;
      }

      .role-icon {
        font-size: 3.5rem;
        margin-bottom: 15px;
      }

      .role-title {
        font-size: 1.4rem;
      }

      .decoration {
        font-size: 2rem;
        opacity: 0.2;
      }
    }
  </style>
</head>
<body>
  <!-- 可爱的装饰元素 -->
  <div class="decoration">⭐</div>
  <div class="decoration">🌈</div>
  <div class="decoration">📚</div>
  <div class="decoration">✏️</div>

  <div class="home-container">
    <h1 class="title">亲子听写对战</h1>
    <p class="subtitle">和爸爸妈妈一起快乐学汉字！</p>

    <div class="role-cards">
      <a href="host.html" class="role-card">
        <div class="role-icon">👨‍👩‍👧</div>
        <div class="role-title">家长端</div>
        <div class="role-desc">创建房间<br>选择听写词语</div>
      </a>

      <a href="player.html" class="role-card">
        <div class="role-icon">✍️</div>
        <div class="role-title">学生端</div>
        <div class="role-desc">加入房间<br>手写汉字作答</div>
      </a>
    </div>

    <div class="footer">
      <p>支持手机和电脑 | 使用 AI 智能识别</p>
    </div>
  </div>
</body>
</html>
